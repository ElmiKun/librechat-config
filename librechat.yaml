version: 1.3.5
cache: true

endpoints:
  custom:
    - name: "ZAI"
      apiKey: "${ZAI_API_KEY}"
      baseURL: "https://api.z.ai/api/coding/paas/v4"
      models:
        default:
          - "GLM-4.7"
          - "glm-5.1"
        fetch: false
      modelDisplayLabel: "GLM Coding"

interface:
  mcpServers:
    use: true
    create: true

mcpServers:
  web-search-prime:
    type: streamable-http
    url: "https://api.z.ai/api/mcp/web_search_prime/mcp"
    headers:
      Authorization: "Bearer ${ZAI_API_KEY}"
    timeout: 60000
    initTimeout: 60000
    chatMenu: true
    description: "Z.AI Web Search MCP"
