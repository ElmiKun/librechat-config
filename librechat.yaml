version: 1.3.5
cache: true

endpoints:
  custom:
    - name: "ZAI"
      apiKey: "${ZAI_API_KEY}"
      baseURL: "https://api.z.ai/api/coding/paas/v4"
      models:
        default:
          - "glm-5.1"
          - "glm-4.7"
          - "glm-4.5-air"
        fetch: false
      titleConvo: true
      titleMethod: "completion"
      titleModel: "current_model"
      summarize: false
      modelDisplayLabel: "GLM Coding"
