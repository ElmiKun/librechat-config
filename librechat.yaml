version: 1.3.5
cache: false

endpoints:
  custom:
    - name: "ZAI"
      apiKey: "${ZAI_API_KEY}"
      baseURL: "https://api.z.ai/api/coding/paas/v4/chat/completions"
      directEndpoint: true
      headers:
        Authorization: "Bearer ${ZAI_API_KEY}"
        Content-Type: "application/json"
      models:
        default:
          - "GLM-4.7"
        fetch: false
      titleConvo: false
      summarize: false
      modelDisplayLabel: "GLM Coding"
